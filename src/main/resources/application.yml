spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reservecore}
    username: ${SPRING_DATASOURCE_USERNAME:reservecore_user}
    password: ${SPRING_DATASOURCE_PASSWORD:reservecore_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:reservecore-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000  # 24時間
  admin:
    email: ${ADMIN_EMAIL:admin@reservecore.com}
    password: ${ADMIN_PASSWORD:admin1234}  # 本番では必ず環境変数で上書きすること
    name: ${ADMIN_NAME:管理者}
