spring:
  datasource:
    # 接続 URL の決定順:
    #   1. SPRING_DATASOURCE_URL が直接指定されていればそれを使う
    #      (ローカル docker-compose / CI はこちら。jdbc: 付きで渡している)
    #   2. 無ければ DB_HOST / DB_PORT / DB_NAME から jdbc URL を組み立てる
    #      (Render はこちら。connectionString は jdbc: が付かないため個別取得して合成)
    #   3. どちらも無ければ localhost (素のローカル起動)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reservecore}}
    username: ${SPRING_DATASOURCE_USERNAME:reservecore_user}
    password: ${SPRING_DATASOURCE_PASSWORD:reservecore_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true

server:
  # Render など PaaS は PORT 環境変数を注入する。未設定時は 8080。
  port: ${PORT:8080}

# Spring Boot Actuator: ヘルスチェック用 (/actuator/health)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:reservecore-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000  # 24時間
  admin:
    email: ${ADMIN_EMAIL:admin@reservecore.com}
    password: ${ADMIN_PASSWORD:admin1234}  # 本番では必ず環境変数で上書きすること
    name: ${ADMIN_NAME:管理者}
  cors:
    # フロントエンドの許可 Origin (カンマ区切りで複数可)
    # ローカル: http://localhost:3000 / 本番: Vercel デプロイ URL
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  demo-data:
    # 起動時にデモ用の店舗・サービス・スタッフ・サンプル顧客を投入するか。
    # 実運用に切り替える場合は DEMO_DATA_ENABLED=false で無効化できる。
    enabled: ${DEMO_DATA_ENABLED:true}
