version: '3.8'

services:
  db:
    image: postgres:15
    container_name: reservecore-db
    environment:
      POSTGRES_DB: reservecore
      POSTGRES_USER: reservecore_user
      POSTGRES_PASSWORD: reservecore_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservecore_user -d reservecore"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: reservecore-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/reservecore
      SPRING_DATASOURCE_USERNAME: reservecore_user
      SPRING_DATASOURCE_PASSWORD: reservecore_pass
    ports:
      - "8080:8080"

volumes:
  postgres_data:
